packages:
  - apps/*
  - generated/default/*
  - libs/*

allowBuilds:
  '@swc/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  esbuild: true
  nx: true
  prisma: true

minimumReleaseAge: 0

onlyBuiltDependencies:
  - '@swc/core'
  - '@prisma/engines'
  - '@scarf/scarf'
  - esbuild
  - nx
  - prisma
